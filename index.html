<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>To-Do App</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

    <h1>Lista To-Do</h1>

    <input id="inputTarefa" placeholder="Adicione uma tarefa">
    <button onclick="adicionarTarefa()">Adicionar</button>

    <br><br>

    <button onclick="mudarFiltro('todas')">Todas</button>
    <button onclick="mudarFiltro('pendentes')">Pendentes</button>
    <button onclick="mudarFiltro('concluidas')">Concluídas</button>
    <button onclick="limparConcluidas()">Limpar concluídas</button>

    <ul id="lista"></ul>

    <p id="contador"></p>

    </div>

    <script src="app.js"></script>
</body>
</html>
